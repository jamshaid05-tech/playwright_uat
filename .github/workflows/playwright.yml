name: Playwright Tests + Allure Report
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test-and-report:
    name: Run Tests & Publish Allure Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      URL: ${{ vars.URL }}
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Debug - check secrets exist
        run: |
          if [ -z "$URL" ]; then echo "URL is EMPTY"; else echo "URL is SET"; fi
          if [ -z "$EMAIL" ]; then echo "EMAIL is EMPTY"; else echo "EMAIL is SET"; fi
          if [ -z "$PASSWORD" ]; then echo "PASSWORD is EMPTY"; else echo "PASSWORD is SET"; fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          export URL="${{ vars.URL }}"
          export EMAIL="${{ secrets.EMAIL }}"
          export PASSWORD="${{ secrets.PASSWORD }}"
          npx playwright test
        continue-on-error: true
      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report
        if: always()
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      - name: Zip Allure Report
        if: always()
        run: |
          if [ -d "allure-report" ]; then
            zip -r allure-report.zip allure-report
          fi

      - name: Send Allure Report via Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright UAT Report — #${{ github.run_number }} (${{ job.status }})"
          to: jbhati7860@gmail.com
          from: XtremeLabs UAT CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            Playwright UAT automation run completed.

            Status:  ${{ job.status }}
            Branch:  ${{ github.ref_name }}
            Commit:  ${{ github.sha }}

            View the live Allure report here:
            https://jamshaid05-tech.github.io/playwright_uat/

            Full CI run log:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The Allure HTML report is also attached as a zip.
          attachments: allure-report.zip
